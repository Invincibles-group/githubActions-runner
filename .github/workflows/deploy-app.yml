name: Deploy Flask App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get public IP
        run: curl -s https://ipify.org

      - name: deploy with docker compose
        run: docker compose up -d --build