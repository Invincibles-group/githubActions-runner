# packages and dependencies should be regularly scanned for vulnerabilities
# This workflow uses the trivy action to scan for vulnerabilities in your dependencies and report any findings
# pip-audit is another popular tool for scanning Python dependencies for vulnerabilities. This workflow uses the pip-audit action to run pip-audit on your dependencies and report any findings.

name: dependency scan

on:
  workflow_call:

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: setup python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit


      - name: Audit dependencies with pip-audit
        run: pip-audit -r requirements.txt
